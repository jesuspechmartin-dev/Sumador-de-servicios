<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumadora de Servicios CFE</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; display: flex; justify-content: center; }

        /* LOGIN */
        .login-wrap { width: 100%; max-width: 400px; margin-top: 80px; }
        .login-box { background: white; padding: 35px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .login-box h2 { text-align: center; color: #2c3e50; margin: 0 0 25px; }
        .login-box label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 13px; color: #34495e; }
        .login-box input { width: 100%; padding: 11px 12px; font-size: 15px; border: 2px solid #bdc3c7; border-radius: 6px; outline: none; margin-bottom: 16px; transition: border-color 0.3s; }
        .login-box input:focus { border-color: #2ecc71; }
        .btn-login { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .btn-login:hover { background-color: #27ae60; }
        .login-error { color: #e74c3c; font-size: 13px; text-align: center; margin-top: 10px; display: none; }

        /* LOADING */
        .loading-screen { position: fixed; inset: 0; background: #f4f6f9; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .loading-screen .spinner { width: 48px; height: 48px; border: 5px solid #ddd; border-top-color: #2ecc71; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-screen p { color: #7f8c8d; font-size: 15px; }

        /* APP */
        .app-wrap { display: none; width: 100%; max-width: 860px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 20px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); flex-wrap: wrap; gap: 8px; }
        .topbar-left { font-weight: bold; color: #2c3e50; font-size: 15px; }
        .topbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .badge-usuario { background: #eaf4fd; color: #2980b9; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .badge-admin { background: #fef3e2; color: #e67e22; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .btn-logout { padding: 6px 14px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .btn-logout:hover { background: #c0392b; }

        .periodo-banner { background: white; border-radius: 10px; padding: 14px 20px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .periodo-label { font-size: 13px; color: #7f8c8d; font-weight: bold; white-space: nowrap; }
        .periodo-activo-nombre { font-size: 15px; font-weight: bold; color: #2c3e50; background: #eafaf1; border: 2px solid #2ecc71; padding: 5px 16px; border-radius: 20px; }
        .periodo-activo-nombre.sin-periodo { background: #fef9e7; border-color: #f39c12; color: #e67e22; }

        .container { background: white; padding: 25px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .stats-row { display: flex; gap: 15px; margin-bottom: 25px; }
        .stat-box { flex: 1; padding: 18px; border-radius: 8px; text-align: center; color: white; }
        .stat-box.total { background-color: #2ecc71; flex: 2; }
        .stat-box.contador { background-color: #3498db; }
        .stat-label { font-size: 0.8rem; opacity: 0.9; margin-bottom: 4px; }
        .stat-value { font-size: 1.8rem; font-weight: bold; line-height: 1; }
        .stat-box.total .stat-value { font-size: 2rem; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        input[type="text"] { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #bdc3c7; border-radius: 6px; outline: none; transition: border-color 0.3s; }
        input[type="text"]:focus { border-color: #2ecc71; }

        .action-buttons { margin-bottom: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; border: none; color: white; }
        .btn-export   { background-color: #3498db; }
        .btn-export:hover   { background-color: #2980b9; }
        .btn-clear    { background-color: #e74c3c; margin-left: auto; }
        .btn-clear:hover    { background-color: #c0392b; }
        .btn-usuarios { background-color: #e67e22; }
        .btn-usuarios:hover { background-color: #d35400; }
        .btn-periodos { background-color: #8e44ad; }
        .btn-periodos:hover { background-color: #7d3c98; }

        .filtros-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
        .filtros-row label { margin: 0; font-size: 13px; white-space: nowrap; font-weight: bold; color: #34495e; }
        .filtros-row select { padding: 7px 10px; border: 2px solid #bdc3c7; border-radius: 6px; font-size: 13px; outline: none; }

        table { width: 100%; border-collapse: collapse; margin-top: 6px; }
        th, td { padding: 10px 11px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #34495e; font-size: 12px; }
        .txt-monto { font-weight: bold; }
        .txt-fecha { color: #7f8c8d; font-size: 12px; }
        .empty-msg { text-align: center; color: #aaa; padding: 20px; font-size: 14px; }
        .btn-del { background: none; border: none; cursor: pointer; color: #e74c3c; font-size: 17px; padding: 2px 6px; border-radius: 4px; }
        .btn-del:hover { background-color: #fdecea; }
        .chip-user { display: inline-block; background: #eaf4fd; color: #2980b9; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .chip-periodo { display: inline-block; background: #f5eef8; color: #8e44ad; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-weight: bold; }

        /* Modales */
        .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; justify-content: center; align-items: center; }
        .modal-bg.activo { display: flex; }
        .modal { background: white; border-radius: 12px; padding: 28px 28px 20px; width: 100%; max-width: 460px; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
        .modal h3 { margin: 0 0 16px; color: #2c3e50; }
        .modal input { width: 100%; padding: 10px 12px; font-size: 14px; border: 2px solid #bdc3c7; border-radius: 6px; outline: none; margin-bottom: 10px; }
        .modal input:focus { border-color: #2ecc71; }
        .modal-btns { display: flex; gap: 10px; margin-top: 6px; }
        .btn-agregar { background: #2ecc71; flex: 1; }
        .btn-agregar:hover { background: #27ae60; }
        .btn-cerrar-modal { background: #95a5a6; flex: 1; }
        .btn-cerrar-modal:hover { background: #7f8c8d; }

        .lista-items { margin-top: 16px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; border-radius: 6px; background: #f8f9fa; margin-bottom: 8px; font-size: 13px; gap: 8px; }
        .item-row-info { flex: 1; }
        .item-row span { color: #2c3e50; font-weight: bold; }
        .item-row small { color: #7f8c8d; margin-left: 6px; }
        .item-row-btns { display: flex; gap: 6px; }
        .btn-del-item { background: none; border: none; color: #e74c3c; font-size: 15px; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
        .btn-del-item:hover { background: #fdecea; }
        .btn-cerrar-periodo { background: #e74c3c; border: none; color: white; font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
        .btn-activar-periodo { background: #2ecc71; border: none; color: white; font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
        .badge-periodo-abierto { background: #eafaf1; color: #27ae60; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .badge-periodo-cerrado { background: #fdecea; color: #e74c3c; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }

        .solicitud-row { background: #fef9e7; border: 1px solid #f39c12; border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; font-size: 13px; }
        .solicitud-row .sol-info { color: #555; margin-bottom: 6px; }
        .solicitud-row .sol-btns { display: flex; gap: 8px; }
        .btn-aprobar  { background: #2ecc71; border: none; color: white; font-size: 12px; font-weight: bold; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
        .btn-rechazar { background: #e74c3c; border: none; color: white; font-size: 12px; font-weight: bold; padding: 4px 12px; border-radius: 4px; cursor: pointer; }

        .tab-btns { display: flex; gap: 6px; margin-bottom: 14px; }
        .tab-btn { padding: 7px 14px; border: 2px solid #bdc3c7; background: white; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; color: #7f8c8d; }
        .tab-btn.activo { background: #8e44ad; color: white; border-color: #8e44ad; }

        .notif { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); min-width: 320px; max-width: 90%; padding: 16px 20px; border-radius: 10px; font-size: 14px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 9999; text-align: center; animation: slideDown 0.3s ease; }
        .notif.error   { background-color: #e74c3c; color: white; }
        .notif.success { background-color: #2ecc71; color: white; }
        .notif.warning { background-color: #f39c12; color: white; }
        @keyframes slideDown { from { opacity: 0; top: 0px; } to { opacity: 1; top: 20px; } }
    </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loading-screen">
    <div class="spinner"></div>
    <p>Conectando con Firebase...</p>
</div>

<div id="notif" class="notif"></div>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap" style="display:none;">
    <div class="login-box">
        <h2>🔐 Iniciar Sesión</h2>
        <label>Usuario</label>
        <input type="text" id="inp-user" placeholder="Usuario" autocomplete="off">
        <label>Contraseña</label>
        <input type="password" id="inp-pass" placeholder="Contraseña">
        <button class="btn-login" id="btn-login">Entrar</button>
        <div class="login-error" id="login-error">Usuario o contraseña incorrectos</div>
    </div>
</div>

<!-- APP -->
<div class="app-wrap" id="app-wrap">
    <div class="topbar">
        <div class="topbar-left">📋 Sumadora de Servicios CFE</div>
        <div class="topbar-right">
            <span class="badge-usuario" id="badge-usuario"></span>
            <span class="badge-admin" id="badge-admin" style="display:none;">ADMIN</span>
            <button class="btn-logout" id="btn-logout">Salir</button>
        </div>
    </div>

    <div class="periodo-banner">
        <span class="periodo-label">Período activo:</span>
        <span class="periodo-activo-nombre sin-periodo" id="periodo-activo-nombre">Sin período activo</span>
        <span id="sol-pendientes-badge" style="display:none; background:#f39c12; color:white; font-size:11px; padding:3px 10px; border-radius:12px; font-weight:bold;"></span>
    </div>

    <div class="container">
        <div class="stats-row">
            <div class="stat-box total">
                <div class="stat-label">Total acumulado</div>
                <div class="stat-value">$<span id="gran-total">0.00</span> MXN</div>
            </div>
            <div class="stat-box contador">
                <div class="stat-label">Recibos</div>
                <div class="stat-value" id="contador">0</div>
            </div>
        </div>

        <div class="input-group">
            <label for="lector-input">Escanea el código de barras aquí:</label>
            <input type="text" id="lector-input" placeholder="Esperando lectura del escáner..." autocomplete="off">
        </div>

        <div class="action-buttons">
            <button class="btn btn-export"   id="btn-export">Exportar CSV</button>
            <button class="btn btn-periodos" id="btn-periodos" style="display:none;">Gestionar Períodos</button>
            <button class="btn btn-usuarios" id="btn-usuarios" style="display:none;">Gestionar Usuarios</button>
            <button class="btn btn-clear"    id="btn-clear"    style="display:none;">Limpiar Todo</button>
        </div>

        <div class="filtros-row">
            <label>Período:</label>
            <select id="filtro-periodo"><option value="">Todos los períodos</option></select>
            <label>Usuario:</label>
            <select id="filtro-usuario"><option value="">Todos los usuarios</option></select>
        </div>

        <h3 style="margin:0 0 8px;">Historial de Escaneos</h3>
        <table>
            <thead>
                <tr>
                    <th>#</th><th>Período</th><th>Usuario</th>
                    <th>Fecha/Hora</th><th>No. Servicio</th><th>Monto</th><th></th>
                </tr>
            </thead>
            <tbody id="lista-escaneos"></tbody>
        </table>
    </div>
</div>

<!-- MODAL PERÍODOS -->
<div class="modal-bg" id="modal-periodos">
    <div class="modal">
        <h3>📅 Gestionar Períodos</h3>
        <div class="tab-btns">
            <button class="tab-btn activo" onclick="mostrarTab('periodos')">Períodos</button>
            <button class="tab-btn" id="tab-sol-btn" onclick="mostrarTab('solicitudes')">Solicitudes <span id="sol-count-badge"></span></button>
        </div>
        <div id="tab-periodos">
            <input type="text" id="np-nombre" placeholder="Nombre del período (ej. FEB 26 - ABR 26)">
            <div class="modal-btns">
                <button class="btn btn-agregar" id="btn-agregar-periodo">Crear período</button>
                <button class="btn btn-cerrar-modal" id="btn-cerrar-periodos">Cerrar</button>
            </div>
            <div class="lista-items" id="lista-periodos"></div>
        </div>
        <div id="tab-solicitudes" style="display:none;">
            <div class="lista-items" id="lista-solicitudes"></div>
            <button class="btn btn-cerrar-modal" id="btn-cerrar-sol" style="margin-top:10px;width:100%;">Cerrar</button>
        </div>
    </div>
</div>

<!-- MODAL USUARIOS -->
<div class="modal-bg" id="modal-usuarios">
    <div class="modal">
        <h3>👥 Gestionar Usuarios</h3>
        <input type="text" id="nu-user" placeholder="Nombre de usuario">
        <input type="password" id="nu-pass" placeholder="Contraseña">
        <div class="modal-btns">
            <button class="btn btn-agregar" id="btn-agregar-user">Agregar usuario</button>
            <button class="btn btn-cerrar-modal" id="btn-cerrar-users">Cerrar</button>
        </div>
        <div class="lista-items" id="lista-usuarios"></div>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, remove, update }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyA5bA-EkGwO6XX43mW0x64tNrKndG5ZExs",
    authDomain: "sumadora-cfe.firebaseapp.com",
    databaseURL: "https://sumadora-cfe-default-rtdb.firebaseio.com",
    projectId: "sumadora-cfe",
    storageBucket: "sumadora-cfe.firebasestorage.app",
    messagingSenderId: "712253288277",
    appId: "1:712253288277:web:7adbed377ce9d0286049dc"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── ESTADO LOCAL (espejo de Firebase) ────────────────────────────────
var usuarios    = {};
var periodos    = {};
var historial   = {};
var solicitudes = {};
var usuarioActual = null;
var temporizadorLectura, temporizadorNotif;

// ── NOTIF ─────────────────────────────────────────────────────────────
function mostrarNotif(msg, tipo) {
    var n = document.getElementById('notif');
    n.textContent = msg; n.className = 'notif ' + tipo; n.style.display = 'block';
    clearTimeout(temporizadorNotif);
    temporizadorNotif = setTimeout(function() { n.style.display = 'none'; }, 3800);
}

// ── ESCUCHAR FIREBASE EN TIEMPO REAL ──────────────────────────────────
onValue(ref(db, 'usuarios'),    function(snap) { usuarios    = snap.val() || {}; });
onValue(ref(db, 'periodos'),    function(snap) { periodos    = snap.val() || {}; actualizarBannerPeriodo(); actualizarFiltros(); actualizarInterfaz(); });
onValue(ref(db, 'historial'),   function(snap) { historial   = snap.val() || {}; actualizarFiltros(); actualizarInterfaz(); });
onValue(ref(db, 'solicitudes'), function(snap) { solicitudes = snap.val() || {}; actualizarBannerPeriodo(); });

// Ocultar loading y mostrar login cuando Firebase responde
onValue(ref(db, 'usuarios'), function() {
    document.getElementById('loading-screen').style.display = 'none';
    var sesionGuardada = sessionStorage.getItem('usuarioActual');
    if (sesionGuardada) {
        var u = JSON.parse(sesionGuardada);
        // Verificar que el usuario sigue existiendo en Firebase
        var encontrado = Object.values(usuarios).find(function(x) { return x.user === u.user && x.pass === u.pass; });
        if (encontrado) {
            usuarioActual = encontrado;
            mostrarApp();
            return;
        } else {
            sessionStorage.removeItem('usuarioActual');
        }
    }
    if (!usuarioActual) document.getElementById('login-wrap').style.display = 'flex';
}, { onlyOnce: true });

// Crear admin por defecto si no existe
onValue(ref(db, 'usuarios/admin'), function(snap) {
    if (!snap.val()) {
        set(ref(db, 'usuarios/admin'), { user: 'admin', pass: 'admin', esAdmin: true });
    }
}, { onlyOnce: true });

// ── LOGIN ─────────────────────────────────────────────────────────────
function intentarLogin() {
    var u = document.getElementById('inp-user').value.trim();
    var p = document.getElementById('inp-pass').value;
    var found = Object.values(usuarios).find(function(x) { return x.user === u && x.pass === p; });
    if (!found) { document.getElementById('login-error').style.display = 'block'; return; }
    usuarioActual = found;
    sessionStorage.setItem('usuarioActual', JSON.stringify(found));
    document.getElementById('login-error').style.display = 'none';
    document.getElementById('inp-user').value = '';
    document.getElementById('inp-pass').value = '';
    mostrarApp();
}

document.getElementById('btn-login').addEventListener('click', intentarLogin);
document.getElementById('inp-pass').addEventListener('keyup', function(e) { if (e.key === 'Enter') intentarLogin(); });

function mostrarApp() {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('app-wrap').style.display   = 'block';
    document.getElementById('badge-usuario').textContent = '👤 ' + usuarioActual.user;
    if (usuarioActual.esAdmin) {
        ['badge-admin','btn-clear','btn-usuarios','btn-periodos'].forEach(function(id) {
            document.getElementById(id).style.display = 'inline-block';
        });
    }
    actualizarBannerPeriodo();
    actualizarFiltros();
    actualizarInterfaz();
    setTimeout(function() { document.getElementById('lector-input').focus(); }, 100);
}

document.getElementById('btn-logout').addEventListener('click', function() {
    usuarioActual = null;
    sessionStorage.removeItem('usuarioActual');
    document.getElementById('app-wrap').style.display   = 'none';
    document.getElementById('login-wrap').style.display = 'flex';
    ['badge-admin','btn-clear','btn-usuarios','btn-periodos'].forEach(function(id) {
        document.getElementById(id).style.display = 'none';
    });
});

// ── PERÍODO ACTIVO ────────────────────────────────────────────────────
function getPeriodoActivo() {
    return Object.values(periodos).find(function(p) { return p.abierto; }) || null;
}

function actualizarBannerPeriodo() {
    var p  = getPeriodoActivo();
    var el = document.getElementById('periodo-activo-nombre');
    if (p) {
        el.textContent = p.nombre;
        el.className   = 'periodo-activo-nombre';
    } else {
        el.textContent = 'Sin período activo';
        el.className   = 'periodo-activo-nombre sin-periodo';
    }
    var pendientes = Object.values(solicitudes).filter(function(s) { return s.estado === 'pendiente'; });
    var badge = document.getElementById('sol-pendientes-badge');
    if (usuarioActual && usuarioActual.esAdmin && pendientes.length > 0) {
        badge.textContent    = pendientes.length + ' solicitud(es) pendiente(s)';
        badge.style.display  = 'inline-block';
    } else {
        badge.style.display  = 'none';
    }
}

// ── FOCO ──────────────────────────────────────────────────────────────
var inputLector = document.getElementById('lector-input');
document.addEventListener('click', function(e) {
    if (!usuarioActual) return;
    if (document.getElementById('modal-periodos').classList.contains('activo')) return;
    if (document.getElementById('modal-usuarios').classList.contains('activo')) return;
    var clases = ['btn-del','btn-del-item','btn-cerrar-periodo','btn-activar-periodo','btn-aprobar','btn-rechazar','tab-btn','btn-login'];
    var ids    = ['btn-export','btn-clear','btn-usuarios','btn-periodos','btn-logout','filtro-periodo','filtro-usuario'];
    if (!clases.some(function(c){ return e.target.classList.contains(c); }) && ids.indexOf(e.target.id) === -1) {
        inputLector.focus();
    }
});

// ── ESCÁNER ───────────────────────────────────────────────────────────
inputLector.addEventListener('keyup', function() {
    clearTimeout(temporizadorLectura);
    temporizadorLectura = setTimeout(function() {
        var codigo = inputLector.value.trim();
        if (codigo.length >= 10) { procesarCodigo(codigo); inputLector.value = ''; }
    }, 500);
});

function procesarCodigo(codigo) {
    var p = getPeriodoActivo();
    if (!p) { mostrarNotif('⚠️ No hay período activo. El admin debe crear uno.', 'warning'); return; }

    var duplicado = Object.values(historial).find(function(item) { return item.codigo === codigo; });
    if (duplicado) {
        var pDup = Object.values(periodos).find(function(x) { return x.id === duplicado.periodoId; });
        mostrarNotif('⚠️ Recibo ya registrado en "' + (pDup ? pDup.nombre : '?') + '" por ' + duplicado.usuario +
            ' — No. Servicio: ' + duplicado.codigo.substring(2,14) + ' ($' + duplicado.monto.toFixed(2) + ' MXN)', 'error');
        return;
    }

    var seccionFinal = codigo.slice(-10);
    var monto = parseInt(seccionFinal.substring(0, seccionFinal.length - 1), 10);
    if (isNaN(monto) || monto === 0) { mostrarNotif('❌ No se pudo extraer el monto.', 'error'); return; }

    var ahora = new Date();
    var fecha = ahora.toLocaleDateString('es-MX', { day:'2-digit', month:'2-digit', year:'numeric' })
              + ' ' + ahora.toLocaleTimeString('es-MX', { hour12: false });

    var nuevoRef = push(ref(db, 'historial'));
    set(nuevoRef, { fecha: fecha, codigo: codigo, monto: monto, usuario: usuarioActual.user, periodoId: p.id });
    mostrarNotif('✅ [' + p.nombre + '] No. Servicio: ' + codigo.substring(2,14) + ' — $' + monto.toFixed(2) + ' MXN', 'success');
}

// ── FILTROS ───────────────────────────────────────────────────────────
function actualizarFiltros() {
    var selP = document.getElementById('filtro-periodo');
    var valP = selP.value;
    selP.innerHTML = '<option value="">Todos los períodos</option>';
    Object.values(periodos).forEach(function(p) {
        var opt = document.createElement('option');
        opt.value = p.id; opt.textContent = p.nombre + (p.abierto ? ' ✓' : '');
        selP.appendChild(opt);
    });
    selP.value = valP;

    var selU = document.getElementById('filtro-usuario');
    var valU = selU.value;
    selU.innerHTML = '<option value="">Todos los usuarios</option>';
    var vistos = {};
    Object.values(historial).forEach(function(item) {
        if (!vistos[item.usuario]) {
            vistos[item.usuario] = true;
            var opt = document.createElement('option');
            opt.value = item.usuario; opt.textContent = item.usuario;
            selU.appendChild(opt);
        }
    });
    selU.value = valU;
}

document.getElementById('filtro-periodo').addEventListener('change', actualizarInterfaz);
document.getElementById('filtro-usuario').addEventListener('change', actualizarInterfaz);

// ── TABLA ─────────────────────────────────────────────────────────────
function actualizarInterfaz() {
    if (!usuarioActual) return;
    var tbody     = document.getElementById('lista-escaneos');
    var filtroPer = document.getElementById('filtro-periodo').value;
    var filtroUsr = document.getElementById('filtro-usuario').value;

    var lista = Object.entries(historial).filter(function(e) {
        var item = e[1];
        return (filtroPer === '' || item.periodoId === filtroPer) &&
               (filtroUsr === '' || item.usuario   === filtroUsr);
    }).reverse();

    tbody.innerHTML = '';
    var total = 0;

    if (lista.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">Sin escaneos aún</td></tr>';
        document.getElementById('gran-total').textContent = '0.00';
        document.getElementById('contador').textContent   = '0';
        return;
    }

    lista.forEach(function(entry, idx) {
        var key  = entry[0];
        var item = entry[1];
        total += item.monto;
        var per = Object.values(periodos).find(function(p) { return p.id === item.periodoId; });
        var perNombre  = per ? per.nombre : '—';
        var esCerrado  = per && !per.abierto;
        var esAdmin    = usuarioActual.esAdmin;
        var esPropio   = item.usuario === usuarioActual.user;

        var delBtn = '';
        if (esAdmin) {
            delBtn = '<button class="btn-del" data-key="' + key + '" title="Eliminar">✕</button>';
        } else if (esPropio && esCerrado) {
            delBtn = '<button class="btn-del btn-solicitar-edit" data-key="' + key + '" data-periodo="' + perNombre + '" title="Solicitar eliminación" style="color:#e67e22;">✎</button>';
        } else if (esPropio && !esCerrado) {
            delBtn = '<button class="btn-del" data-key="' + key + '" title="Eliminar">✕</button>';
        }

        var fila = document.createElement('tr');
        fila.innerHTML =
            '<td style="color:#aaa;font-size:12px;">' + (idx+1) + '</td>' +
            '<td><span class="chip-periodo">' + perNombre + '</span></td>' +
            '<td><span class="chip-user">' + item.usuario + '</span></td>' +
            '<td class="txt-fecha">' + item.fecha + '</td>' +
            '<td style="font-family:monospace;font-size:12px;">' + item.codigo.substring(2,14) + '</td>' +
            '<td class="txt-monto">$' + item.monto.toFixed(2) + '</td>' +
            '<td>' + delBtn + '</td>';
        tbody.appendChild(fila);
    });

    document.getElementById('gran-total').textContent = total.toFixed(2);
    document.getElementById('contador').textContent   = lista.length;

    tbody.querySelectorAll('.btn-del').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var k = btn.getAttribute('data-key');
            if (btn.classList.contains('btn-solicitar-edit')) {
                var pN = btn.getAttribute('data-periodo');
                setTimeout(function() { crearSolicitud(k, pN); }, 50);
            } else {
                setTimeout(function() {
                    if (confirm('¿Eliminar este recibo?')) {
                        remove(ref(db, 'historial/' + k));
                        mostrarNotif('🗑️ Recibo eliminado.', 'error');
                    }
                    inputLector.focus();
                }, 50);
            }
        });
    });
}

// ── SOLICITUDES ───────────────────────────────────────────────────────
function crearSolicitud(key, periodoNombre) {
    var item = historial[key];
    if (!item) return;
    var yaExiste = Object.values(solicitudes).find(function(s) { return s.key === key && s.estado === 'pendiente'; });
    if (yaExiste) { mostrarNotif('Ya hay una solicitud pendiente para este recibo.', 'warning'); return; }
    var nuevoRef = push(ref(db, 'solicitudes'));
    set(nuevoRef, {
        id: nuevoRef.key, key: key, usuario: usuarioActual.user,
        periodoNombre: periodoNombre, noServicio: item.codigo.substring(2,14),
        monto: item.monto, fecha: new Date().toLocaleDateString('es-MX'), estado: 'pendiente'
    });
    mostrarNotif('✎ Solicitud enviada al administrador.', 'warning');
}

function renderSolicitudes() {
    var cont = document.getElementById('lista-solicitudes');
    var lista = Object.entries(solicitudes);
    var pendientes = lista.filter(function(e){ return e[1].estado === 'pendiente'; });
    document.getElementById('sol-count-badge').textContent = pendientes.length > 0 ? '(' + pendientes.length + ')' : '';

    if (lista.length === 0) { cont.innerHTML = '<p style="color:#aaa;text-align:center;font-size:13px;">Sin solicitudes</p>'; return; }
    cont.innerHTML = '';
    lista.reverse().forEach(function(entry) {
        var sk  = entry[0];
        var sol = entry[1];
        var div = document.createElement('div');
        div.className = 'solicitud-row';
        div.innerHTML = '<div class="sol-info"><strong>' + sol.usuario + '</strong> solicita eliminar recibo de <strong>' + sol.periodoNombre + '</strong><br>' +
            'No. Servicio: <code>' + sol.noServicio + '</code> — $' + sol.monto.toFixed(2) + ' MXN<br>' +
            '<span style="font-size:11px;color:#aaa;">' + sol.fecha + ' — ' + sol.estado + '</span></div>';
        if (sol.estado === 'pendiente') {
            div.innerHTML += '<div class="sol-btns">' +
                '<button class="btn-aprobar" data-sk="' + sk + '" data-key="' + sol.key + '">Aprobar</button>' +
                '<button class="btn-rechazar" data-sk="' + sk + '">Rechazar</button></div>';
        }
        cont.appendChild(div);
    });
    cont.querySelectorAll('.btn-aprobar').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var sk = btn.getAttribute('data-sk');
            var k  = btn.getAttribute('data-key');
            remove(ref(db, 'historial/' + k));
            update(ref(db, 'solicitudes/' + sk), { estado: 'aprobada' });
            mostrarNotif('✅ Solicitud aprobada — recibo eliminado.', 'success');
        });
    });
    cont.querySelectorAll('.btn-rechazar').forEach(function(btn) {
        btn.addEventListener('click', function() {
            update(ref(db, 'solicitudes/' + btn.getAttribute('data-sk')), { estado: 'rechazada' });
            mostrarNotif('Solicitud rechazada.', 'error');
        });
    });
}

// ── EXPORTAR ──────────────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', function() {
    var lista = Object.values(historial);
    if (lista.length === 0) { mostrarNotif('No hay datos para exportar.', 'error'); return; }
    var csv = '\uFEFF#,Período,Usuario,Fecha y Hora,No. Servicio,Monto (MXN)\n';
    lista.forEach(function(item, idx) {
        var per = Object.values(periodos).find(function(p) { return p.id === item.periodoId; });
        csv += (idx+1) + ',"' + (per ? per.nombre : '') + '",' + item.usuario +
               ',"' + item.fecha + '",' + item.codigo.substring(2,14) + ',' + item.monto + '\n';
    });
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href = url; a.download = 'reporte_cfe_' + new Date().toISOString().slice(0,10) + '.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
});

// ── LIMPIAR TODO ──────────────────────────────────────────────────────
document.getElementById('btn-clear').addEventListener('click', function() {
    setTimeout(function() {
        if (confirm('¿Borrar PERMANENTEMENTE todo el historial de todos los períodos?\nEsta acción no se puede deshacer.')) {
            remove(ref(db, 'historial'));
            remove(ref(db, 'solicitudes'));
            mostrarNotif('🗑️ Historial borrado completamente.', 'error');
        }
        inputLector.focus();
    }, 50);
});

// ── MODAL PERÍODOS ────────────────────────────────────────────────────
function mostrarTab(tab) {
    document.getElementById('tab-periodos').style.display    = tab === 'periodos'    ? 'block' : 'none';
    document.getElementById('tab-solicitudes').style.display = tab === 'solicitudes' ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach(function(b, i) {
        b.classList.toggle('activo', (i === 0 && tab === 'periodos') || (i === 1 && tab === 'solicitudes'));
    });
    if (tab === 'solicitudes') renderSolicitudes();
}
window.mostrarTab = mostrarTab;

document.getElementById('btn-periodos').addEventListener('click', function() {
    document.getElementById('modal-periodos').classList.add('activo');
    mostrarTab('periodos');
    renderListaPeriodos();
});
['btn-cerrar-periodos','btn-cerrar-sol'].forEach(function(id) {
    document.getElementById(id).addEventListener('click', function() {
        document.getElementById('modal-periodos').classList.remove('activo');
        inputLector.focus();
    });
});

document.getElementById('btn-agregar-periodo').addEventListener('click', function() {
    var nombre = document.getElementById('np-nombre').value.trim();
    if (!nombre) { mostrarNotif('Escribe el nombre del período.', 'error'); return; }
    if (Object.values(periodos).find(function(p) { return p.nombre === nombre; })) {
        mostrarNotif('Ya existe un período con ese nombre.', 'error'); return;
    }
    // Cerrar todos los períodos abiertos
    Object.entries(periodos).forEach(function(e) {
        if (e[1].abierto) update(ref(db, 'periodos/' + e[0]), { abierto: false });
    });
    var nuevoRef = push(ref(db, 'periodos'));
    set(nuevoRef, { id: nuevoRef.key, nombre: nombre, abierto: true });
    document.getElementById('np-nombre').value = '';
    mostrarNotif('✅ Período "' + nombre + '" creado y activo.', 'success');
});

function renderListaPeriodos() {
    var cont = document.getElementById('lista-periodos');
    cont.innerHTML = '';
    var lista = Object.entries(periodos);
    if (lista.length === 0) { cont.innerHTML = '<p style="color:#aaa;text-align:center;font-size:13px;">Sin períodos creados</p>'; return; }
    lista.reverse().forEach(function(entry) {
        var pk  = entry[0];
        var p   = entry[1];
        var rec = Object.values(historial).filter(function(h) { return h.periodoId === p.id; }).length;
        var div = document.createElement('div');
        div.className = 'item-row';
        div.innerHTML =
            '<div class="item-row-info"><span>' + p.nombre + '</span> <small>' + rec + ' recibo(s)</small> ' +
            (p.abierto ? '<span class="badge-periodo-abierto">ACTIVO</span>' : '<span class="badge-periodo-cerrado">CERRADO</span>') +
            '</div><div class="item-row-btns">' +
            (!p.abierto ? '<button class="btn-activar-periodo" data-pk="' + pk + '">Abrir</button>' : '') +
            (p.abierto  ? '<button class="btn-cerrar-periodo"  data-pk="' + pk + '">Cerrar</button>' : '') +
            '</div>';
        cont.appendChild(div);
    });

    cont.querySelectorAll('.btn-cerrar-periodo').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var pk = btn.getAttribute('data-pk');
            var p  = periodos[pk];
            if (p && confirm('¿Cerrar el período "' + p.nombre + '"?')) {
                update(ref(db, 'periodos/' + pk), { abierto: false });
                mostrarNotif('Período cerrado.', 'warning');
            }
        });
    });
    cont.querySelectorAll('.btn-activar-periodo').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var pk = btn.getAttribute('data-pk');
            var p  = periodos[pk];
            if (p && confirm('¿Reabrir el período "' + p.nombre + '"? Se cerrará el actual.')) {
                Object.entries(periodos).forEach(function(e) {
                    if (e[1].abierto) update(ref(db, 'periodos/' + e[0]), { abierto: false });
                });
                update(ref(db, 'periodos/' + pk), { abierto: true });
                mostrarNotif('Período "' + p.nombre + '" ahora está activo.', 'success');
            }
        });
    });
}

onValue(ref(db, 'periodos'),  function() { renderListaPeriodos(); });
onValue(ref(db, 'historial'), function() { renderListaPeriodos(); });

// ── MODAL USUARIOS ────────────────────────────────────────────────────
document.getElementById('btn-usuarios').addEventListener('click', function() {
    document.getElementById('modal-usuarios').classList.add('activo');
    renderListaUsuarios();
});
document.getElementById('btn-cerrar-users').addEventListener('click', function() {
    document.getElementById('modal-usuarios').classList.remove('activo');
    inputLector.focus();
});
document.getElementById('btn-agregar-user').addEventListener('click', function() {
    var u = document.getElementById('nu-user').value.trim();
    var p = document.getElementById('nu-pass').value.trim();
    if (!u || !p) { mostrarNotif('Completa usuario y contraseña.', 'error'); return; }
    if (Object.values(usuarios).find(function(x) { return x.user === u; })) {
        mostrarNotif('Ese usuario ya existe.', 'error'); return;
    }
    set(ref(db, 'usuarios/' + u), { user: u, pass: p, esAdmin: false });
    document.getElementById('nu-user').value = '';
    document.getElementById('nu-pass').value = '';
    mostrarNotif('✅ Usuario "' + u + '" creado.', 'success');
    renderListaUsuarios();
});

function renderListaUsuarios() {
    var cont = document.getElementById('lista-usuarios');
    cont.innerHTML = '';
    Object.entries(usuarios).forEach(function(entry) {
        var u   = entry[1];
        var div = document.createElement('div');
        div.className = 'item-row';
        div.innerHTML =
            '<div class="item-row-info"><span>' + u.user + '</span>' +
            (u.esAdmin ? '<small> (admin)</small>' : '') + '</div>' +
            (!u.esAdmin ? '<button class="btn-del-item" data-user="' + u.user + '">✕</button>' : '');
        cont.appendChild(div);
    });
    cont.querySelectorAll('.btn-del-item').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var nombre = btn.getAttribute('data-user');
            if (confirm('¿Eliminar usuario "' + nombre + '"?')) {
                remove(ref(db, 'usuarios/' + nombre));
                mostrarNotif('Usuario "' + nombre + '" eliminado.', 'error');
                renderListaUsuarios();
            }
        });
    });
}

onValue(ref(db, 'usuarios'), function() { if (document.getElementById('modal-usuarios').classList.contains('activo')) renderListaUsuarios(); });

</script>
